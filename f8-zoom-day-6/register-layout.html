<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regiter Layout</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <main class="page-wrapper">
        <section class="registration">
            <div class="registration__inner">
                <div class="registration__media">
                    <img src="https://colorlib.com/etc/regform/colorlib-regform-16/images/form-img.jpg" alt=""
                        class="registration__image">
                </div>

                <div class="registration__content">
                    <h2 class="registration__heading">Registration Form</h2>

                    <form class="form" action="#" method="POST">
                        <div class="form__group">
                            <input type="text" class="form__input" placeholder="First Name" required>
                        </div>
                        <div class="form__group">
                            <input type="text" class="form__input" placeholder="Last Name" required>
                        </div>

                        <div class="form__group">
                            <input type="email" class="form__input" placeholder="Email Address" required>
                        </div>
                        <div class="form__group">
                            <input type="password" class="form__input" placeholder="Password" required>
                        </div>
                        <div class="form__group">
                            <input type="password" class="form__input" placeholder="Confirm Password" required>
                        </div>
                        <div class="form__actions">
                            <button type="submit" class="form__btn">Register</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
